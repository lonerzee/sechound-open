# Invariant-breaker input. Copy to config/invariants.yaml.
#
# Off-taxonomy hunting: instead of "is there a SQLi?", state the security
# properties the system CLAIMS to hold, then try to falsify each one. Rank by
# how cheaply you can demonstrate a break. A break is a finding seed.
#
# Invariants are domain-neutral — write the ones that matter for YOUR target.
# Profiles ship domain-specific starter sets (see profiles/<domain>/invariants.yaml).

invariants:
  - id: INV-001
    statement: "A principal can never access a resource it is not authorized for."
    class: authorization
    falsify: "As a low-privilege/other principal, request a resource owned by another; expect denial."
    requires: ["principal:low", "principal:owner"]

  - id: INV-002
    statement: "Untrusted input never reaches an interpreter (SQL, shell, template, eval, deserializer) unescaped."
    class: injection
    falsify: "Inject a benign marker payload; check whether it is interpreted vs treated as inert data."

  - id: INV-003
    statement: "No secret (key, token, credential) is recoverable from shipped artifacts or responses."
    class: secret-exposure
    falsify: "Scan artifacts/responses for high-entropy strings and known key formats; confirm reachability."

  - id: INV-004
    statement: "Outbound/side-effecting actions only target the allow-listed destinations."
    class: ssrf-egress
    falsify: "Supply an internal/metadata/arbitrary destination; observe whether it is acted on."

  - id: INV-005
    statement: "No external input controls memory bounds, types, or control flow unsafely."
    class: memory-safety
    falsify: "Provide oversized/malformed input to a parser; watch for crash/overflow/UB signals."

# Add your own. The point is to write down the assumptions and then attack them.
