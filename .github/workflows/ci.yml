name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sanitization:
    # The trust gate: no target-specific data may ever land. Runs first.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sanitization leak scan
        run: bash scripts/check_sanitization.sh

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Compile all tools
        run: python -m compileall -q tools
      - name: Run tests
        run: python -m pytest -q
